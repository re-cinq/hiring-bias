name: deploy-site

on:
  push:
    branches: [main]
    paths:
      - 'results/**'
      - 'report/**'
      - 'data/**'
      - 'scripts/buildSiteData.js'
      - 'src/aggregate.js'
      - 'src/generateVariants.js'
      - 'src/pricing.js'
      - 'src/prompt.js'
      - 'site/**'
      - '.github/workflows/site.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci --omit=dev
      - run: npm run build:site
      - name: Copy CSV and base resume into site data
        run: |
          cp report/data.csv site/data/data.csv
          cp report/summary.md site/data/summary.md
          cp data/resume_base.md site/data/resume_base.md
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site
      - id: deploy
        uses: actions/deploy-pages@v4
